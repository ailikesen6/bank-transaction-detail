        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        body {
            background-color: #f7f7f7;
            color: #333;
            padding-bottom: 20px;
        }
        
        .header {
            background-color: #f7f7f7;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* border-bottom: 1px solid #eee; */
        }
        
        .back-icon {
            position: absolute;
            left: 15px;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            border-radius: 9px;  /* 修改这里：从 50% 改为 9px */
        }
        
        .back-icon::before {
            content: "";
            width: 8px;
            height: 8px;
            border-left: 2px solid #333;
            border-bottom: 2px solid #333;
            transform: rotate(45deg);
            margin-left: 3px;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 500;
        }
        
        .container {
            padding: 15px;
        }
        
        .main-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            margin-bottom: 15px;
        }
        
        .company-name {
            text-align: center;
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }
        
        .amount {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #ff5e5e;
            margin-bottom: 5px;
        }
        
        .balance {
            text-align: center;
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .detail-label {
            color: #999;
            font-size: 15px;
            min-width: 80px;
        }
        
        .detail-value {
            color: #333;
            font-size: 15px;
            text-align: right;
            flex: 1;
            padding-left: 20px;
            word-break: break-all;
        }
        
        .tips-box {
            background-color: #fffdf5;
            border-radius: 8px;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
        }
        
        .tips-text {
            font-size: 13px;
            color: #d4a017;
        }
        
        .btn-transfer {
            width: 100%;
            height: 48px;
            border: 1px solid #0066b3;
            background-color: transparent;
            color: #0066b3;
            border-radius: 8px;
            font-size: 17px;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .banner {
            margin-top: 20px;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(90deg, #1e88e5, #42a5f5);
            padding: 20px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .banner-content h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .banner-content p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .banner-img {
            width: 100px;
            height: auto;
        }
