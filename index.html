<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 下面是核心代码：直接嵌入 emoji 作为图标 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 font-size=%2280%22>💳</text></svg>">
    <title>银行到账明细详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        body {
            background-color: #f7f7f7;
            color: #333;
            padding-bottom: 20px;
        }
        
        .header {
            background-color: #f7f7f7;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* border-bottom: 1px solid #eee; */
        }
        
        .back-icon {
            position: absolute;
            left: 15px;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            border-radius: 9px;  /* 修改这里：从 50% 改为 9px */
        }
        
        .back-icon::before {
            content: "";
            width: 8px;
            height: 8px;
            border-left: 2px solid #333;
            border-bottom: 2px solid #333;
            transform: rotate(45deg);
            margin-left: 3px;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 500;
        }
        
        .container {
            padding: 15px;
        }
        
        .main-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            margin-bottom: 15px;
        }
        
        .company-name {
            text-align: center;
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }
        
        .amount {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #ff5e5e;
            margin-bottom: 5px;
        }
        
        .balance {
            text-align: center;
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .detail-label {
            color: #999;
            font-size: 15px;
            min-width: 80px;
        }
        
        .detail-value {
            color: #333;
            font-size: 15px;
            text-align: right;
            flex: 1;
            padding-left: 20px;
            word-break: break-all;
        }
        
        .tips-box {
            background-color: #fffdf5;
            border-radius: 8px;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
        }
        
        .tips-text {
            font-size: 13px;
            color: #d4a017;
        }
        
        .btn-transfer {
            width: 100%;
            height: 48px;
            border: 1px solid #0066b3;
            background-color: transparent;
            color: #0066b3;
            border-radius: 8px;
            font-size: 17px;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .banner {
            margin-top: 20px;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(90deg, #1e88e5, #42a5f5);
            padding: 20px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .banner-content h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .banner-content p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .banner-img {
            width: 100px;
            height: auto;
        }
        /* 模拟底部的广告位样式 */
        
        .ad-banner {
            margin-top: 15px;
            width: 100%;
            height: 100px;
            background: linear-gradient(to right, #2a7efc, #599bff);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .ad-text {
            color: white;
            z-index: 1;
        }
        
        .ad-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .ad-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .ad-image-placeholder {
            position: absolute;
            right: 10px;
            bottom: 0;
            width: 120px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="back-icon"></div>
        <div class="header-title">明细详情</div>
    </div>

    <div class="container">
        <div class="main-card">
            <div class="company-name">武汉医美伊医疗美容有限责任公司</div>
            <div class="amount">+5,5000.00</div>
            <div class="balance">余额：78,760.25</div>

            <div class="detail-item">
                <div class="detail-label">交易卡号</div>
                <div class="detail-value">622262****3563</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">交易时间</div>
                <div class="detail-value">2026-02-14 12:25:39</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">交易渠道</div>
                <div class="detail-value">企业手机银行</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">交易类型</div>
                <div class="detail-value">转账</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">对方户名</div>
                <div class="detail-value">武汉医美伊医疗美容有限责任公司</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">对方账户</div>
                <div class="detail-value">421421066039763638554</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">对方开户行</div>
                <div class="detail-value">交通银行湖北自贸试验区武汉片区分行</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">交易场景</div>
                <div class="detail-value">本地交行转入</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">摘要</div>
                <div class="detail-value">退费</div>
            </div>

            <div class="tips-box">
                <div class="tips-text">温馨提示：请勿相信转账摘要中任何可疑链接</div>
            </div>
        </div>

        <button class="btn-transfer">给Ta转账</button>

        <div class="ad-banner">
            <div class="ad-text">
                <div class="ad-title">赢5-20元京东E卡</div>
                <div class="ad-subtitle">“交”夏理财季</div>
            </div>
            <div class="ad-image-placeholder">
                广告图区域
            </div>
        </div>
    </div>

</body>

</html>
